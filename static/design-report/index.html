<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Report — Michael Muratov</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Literata:wght@400;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./md-renderer.css">
</head>

<body>

    <!-- Navigation -->
    <nav>
        <a href="/" title="Home">⌂ Home</a>
        <button onclick="toggleTheme()" title="Toggle theme" id="theme-toggle" class="theme-toggle">🌙</button>
    </nav>

    <!-- Header -->
    <header>
        <h1>Design Report</h1>
        <p>Visual identity, interaction patterns, and design philosophy behind my personal style.</p>
    </header>

    <!-- Main Content -->
    <main>
        <div class="loading" id="loading-state">Loading design report…</div>
        <div class="empty-state" id="empty-state" style="display: none;">
            Could not load DESIGN_REPORT.md. Make sure the file exists in the web directory.
        </div>
        <div id="md-container" class="md-content" style="display: none;"></div>
    </main>

    <!-- Footer -->
    <footer>
        <p>Michael Muratov</p>
    </footer>

    <!-- Scripts -->
    <script>
        // Dark/light mode
        const stored = localStorage.getItem("theme");
        const toggleBtn = document.getElementById("theme-toggle");

        if (stored === "dark-mode" || (!stored && matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.body.classList.add("dark-mode");
            toggleBtn.textContent = '☀️';
        }

        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
            const isDark = document.body.classList.contains("dark-mode");
            localStorage.setItem("theme", isDark ? "dark-mode" : "light-mode");
            toggleBtn.textContent = isDark ? '☀️' : '🌙';
        }
    </script>
    <script src="./md-renderer.js"></script>
    <script>
        renderMarkdownPage('./DESIGN_REPORT.md').then(() => {
            const headings = document.querySelectorAll('#md-container h3');
            headings.forEach(h => {
                if (h.textContent.trim() === 'Color System') {
                    const link = document.createElement('a');
                    link.href = './colors.html';
                    link.textContent = '→ View Interactive Palette';
                    link.style.cssText = 'display: block; margin-top: 8px; font-size: 14px;';
                    h.after(link);
                }
            });
        });
    </script>
</body>

</html>
